# Production deployment with `docker compose up -d --build`.
#
# By default we bind the container's SSH port to host port 22 so visitors can
# reach the portfolio simply by typing `ssh <your-domain>`. If port 22 is
# already used by the host's own sshd (very common on most VPS images), move
# your admin sshd to another port first (e.g. 22022) or override SSH_PORT in
# `.env`:
#
#     SSH_PORT=2222   # then visitors connect with `ssh -p 2222 host`

services:
  portfolio-ssh:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-ssh:latest
    container_name: portfolio-ssh
    restart: unless-stopped
    ports:
      - "${SSH_PORT:-22}:2222"
    environment:
      PORT: "2222"
      HOST: "0.0.0.0"
      HOST_KEY_PATH: "/data/keys/host_ed25519"
      MAX_CONNECTIONS: "${MAX_CONNECTIONS:-50}"
      IDLE_TIMEOUT_MS: "${IDLE_TIMEOUT_MS:-900000}"
    volumes:
      - portfolio-ssh-keys:/data/keys
    # Resource limits keep a runaway visitor from exhausting the host. Tune
    # `cpus` / `memory` to whatever fits your VPS.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('net').connect(process.env.PORT||2222,'127.0.0.1').on('connect',s=>{s.end();process.exit(0)}).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  portfolio-ssh-keys:
