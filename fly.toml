app = "portfolio-ssh"
primary_region = "sin"

[build]
  image = "deepfriendadmin/portfolio-ssh:latest"

[env]
  PORT           = "2222"
  MAX_CONNECTIONS = "50"
  IDLE_TIMEOUT_MS = "900000"
  FORCE_COLOR     = "3"
  TERM            = "xterm-256color"

[[services]]
  protocol      = "tcp"
  internal_port = 2222

  [[services.ports]]
    port = 22

[mounts]
  source      = "portfolio_keys"
  destination = "/data/keys"
